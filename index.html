<body class="bg-slate-950 text-white font-sans antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useCallback } = React;

    const supabase = window.supabase.createClient(
      'https://ndmagmorwoccsbbuewds.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kbWFnbW9yd29jY3NiYnVld2RzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMDk2NjEsImV4cCI6MjA5NjY4NTY2MX0.1MmmShbNTNANyMn0MQYIdjNM-ePRmXdAMNICuhPOEFc'
    );

    const ADMIN_PIN = '2026';

    // ── DATA ────────────────────────────────────────────────────────────────────

    const TEAMS_DB = {
      MEX: { name: 'México' }, KOR: { name: 'Corea del Sur' }, RSA: { name: 'Sudáfrica' },
      CZE: { name: 'Rep. Checa' }, CAN: { name: 'Canadá' }, SUI: { name: 'Suiza' },
      QAT: { name: 'Catar' }, BIH: { name: 'Bosnia y H.' }, BRA: { name: 'Brasil' },
      MAR: { name: 'Marruecos' }, SCO: { name: 'Escocia' }, HAI: { name: 'Haití' },
      USA: { name: 'EE.UU.' }, AUS: { name: 'Australia' }, PAR: { name: 'Paraguay' },
      TUR: { name: 'Turquía' }, GER: { name: 'Alemania' }, ECU: { name: 'Ecuador' },
      CIV: { name: 'Costa de Marfil' }, CUW: { name: 'Curazao' }, NED: { name: 'Países Bajos' },
      JPN: { name: 'Japón' }, TUN: { name: 'Túnez' }, SWE: { name: 'Suecia' },
      BEL: { name: 'Bélgica' }, IRN: { name: 'Irán' }, EGY: { name: 'Egipto' },
      NZL: { name: 'N. Zelanda' }, ESP: { name: 'España' }, URU: { name: 'Uruguay' },
      KSA: { name: 'Arabia Saudita' }, CPV: { name: 'Cabo Verde' }, FRA: { name: 'Francia' },
      SEN: { name: 'Senegal' }, NOR: { name: 'Noruega' }, IRQ: { name: 'Irak' },
      ARG: { name: 'Argentina' }, AUT: { name: 'Austria' }, ALG: { name: 'Argelia' },
      JOR: { name: 'Jordania' }, POR: { name: 'Portugal' }, COL: { name: 'Colombia' },
      UZB: { name: 'Uzbekistán' }, COD: { name: 'RD Congo' }, ENG: { name: 'Inglaterra' },
      CRO: { name: 'Croacia' }, GHA: { name: 'Ghana' }, PAN: { name: 'Panamá' }
    };

    const FIFA_TO_ISO = {
      MEX: 'mx', KOR: 'kr', RSA: 'za', CZE: 'cz', CAN: 'ca', SUI: 'ch', QAT: 'qa', BIH: 'ba',
      BRA: 'br', MAR: 'ma', SCO: 'gb-sct', HAI: 'ht', USA: 'us', AUS: 'au', PAR: 'py', TUR: 'tr',
      GER: 'de', ECU: 'ec', CIV: 'ci', CUW: 'cw', NED: 'nl', JPN: 'jp', TUN: 'tn', SWE: 'se',
      BEL: 'be', IRN: 'ir', EGY: 'eg', NZL: 'nz', ESP: 'es', URU: 'uy', KSA: 'sa', CPV: 'cv',
      FRA: 'fr', SEN: 'sn', NOR: 'no', IRQ: 'iq', ARG: 'ar', AUT: 'at', ALG: 'dz', JOR: 'jo',
      POR: 'pt', COL: 'co', UZB: 'uz', COD: 'cd', ENG: 'gb-eng', CRO: 'hr', GHA: 'gh', PAN: 'pa'
    };

    const GROUPS_CONFIG = {
      A: ['MEX', 'KOR', 'RSA', 'CZE'], B: ['CAN', 'SUI', 'QAT', 'BIH'],
      C: ['BRA', 'MAR', 'SCO', 'HAI'], D: ['USA', 'AUS', 'PAR', 'TUR'],
      E: ['GER', 'ECU', 'CIV', 'CUW'], F: ['NED', 'JPN', 'TUN', 'SWE'],
      G: ['BEL', 'IRN', 'EGY', 'NZL'], H: ['ESP', 'URU', 'KSA', 'CPV'],
      I: ['FRA', 'SEN', 'NOR', 'IRQ'], J: ['ARG', 'AUT', 'ALG', 'JOR'],
      K: ['POR', 'COL', 'UZB', 'COD'], L: ['ENG', 'CRO', 'GHA', 'PAN']
    };

    // Deadlines en hora de México (UTC-6, sin horario de verano).
    // M1: 12:00 PM del día inaugural. M2 y M3: una hora antes del silbatazo.
    const MEXICO_MATCHES = [
      { id: 'MEX_M1', date: 'Jue 11 Jun 2026', time: '2:00 PM CDT', stadium: 'Estadio Azteca · Ciudad de México', home: 'MEX', away: 'RSA', title: 'Partido Inaugural', deadline: '2026-06-11T12:00:00-06:00', deadlineLabel: '11 Jun · 12:00 PM' },
      { id: 'MEX_M2', date: 'Jue 18 Jun 2026', time: '8:00 PM CDT', stadium: 'Estadio Akron · Guadalajara', home: 'MEX', away: 'KOR', title: 'Segunda Jornada', deadline: '2026-06-18T19:00:00-06:00', deadlineLabel: '18 Jun · 7:00 PM' },
      { id: 'MEX_M3', date: 'Mié 24 Jun 2026', time: '8:00 PM CDT', stadium: 'Estadio Azteca · Ciudad de México', home: 'MEX', away: 'CZE', title: 'Definición de Grupo', deadline: '2026-06-24T19:00:00-06:00', deadlineLabel: '24 Jun · 7:00 PM' }
    ];

    // interval se guarda como número de minuto ('1'-'120') o 'NONE' (0-0 sin goles)

    // ── FLAG IMAGE ───────────────────────────────────────────────────────────────

    function Flag({ code, className = 'w-8 h-5' }) {
      return (
        <img
          src={`https://flagcdn.com/w40/${FIFA_TO_ISO[code]}.png`}
          className={`${className} object-cover rounded shadow-sm border border-slate-800 shrink-0`}
          alt={TEAMS_DB[code]?.name || code}
          onError={e => { e.target.src = 'https://flagcdn.com/w40/un.png'; }}
        />
      );
    }

    // ── ADMIN PIN MODAL ──────────────────────────────────────────────────────────

    function AdminPinModal({ onUnlock, onClose }) {
      const [pin, setPin] = useState('');
      const [error, setError] = useState(false);

      const handleSubmit = (e) => {
        e.preventDefault();
        if (pin === ADMIN_PIN) { onUnlock(); }
        else { setError(true); setPin(''); setTimeout(() => setError(false), 2000); }
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
          <div className="bg-slate-900 border border-amber-400/40 rounded-2xl p-6 w-full max-w-sm space-y-4 fade-in">
            <div className="text-center space-y-1.5">
              <span className="text-4xl block">🛡️</span>
              <h3 className="text-sm font-black text-amber-300 uppercase tracking-wider">Zona Administrador</h3>
              <p className="text-xs text-slate-400">Ingresa el PIN para continuar</p>
            </div>
            <form onSubmit={handleSubmit} className="space-y-3">
              <input
                type="password"
                value={pin}
                onChange={e => setPin(e.target.value)}
                placeholder="••••"
                maxLength={6}
                autoFocus
                className={`w-full bg-slate-950 border rounded-xl px-4 py-3 text-center text-2xl tracking-widest font-black focus:outline-none transition-colors ${error ? 'border-red-500 text-red-400' : 'border-emerald-700 text-amber-300 focus:border-amber-400'}`}
              />
              {error && <p className="text-xs text-red-400 text-center font-bold animate-pulse">PIN incorrecto. Inténtalo de nuevo.</p>}
              <button type="submit" className="w-full bg-gradient-to-r from-emerald-500 to-teal-500 text-emerald-950 font-black py-3 rounded-xl text-xs uppercase tracking-wider hover:opacity-90 transition-opacity">
                Entrar
              </button>
              <button type="button" onClick={onClose} className="w-full text-slate-500 text-xs py-1 hover:text-slate-300 transition-colors">
                Cancelar
              </button>
            </form>
          </div>
        </div>
      );
    }

    // ── MAIN APP ─────────────────────────────────────────────────────────────────

    function App() {
      const [participants, setParticipants] = useState([]);
      const [realResults, setRealResults] = useState({ mexico: {}, qualifiers: {} });
      const [activeTab, setActiveTab] = useState('predictions');
      const [selectedPlayerId, setSelectedPlayerId] = useState(null);
      const [selectedGroup, setSelectedGroup] = useState('A');
      const [editingPlayerId, setEditingPlayerId] = useState(null);
      const [editingPlayerName, setEditingPlayerName] = useState('');
      const [inspectedPlayerId, setInspectedPlayerId] = useState(null);
      const [notification, setNotification] = useState(null);
      const [syncStatus, setSyncStatus] = useState('connecting');
      const [adminUnlocked, setAdminUnlocked] = useState(false);
      const [showAdminPin, setShowAdminPin] = useState(false);
      const [pendingAdminTab, setPendingAdminTab] = useState(null);
      const [saving, setSaving] = useState(false);
      const [syncing, setSyncing] = useState({});
      const [now, setNow] = useState(Date.now());
      useEffect(() => {
        const t = setInterval(() => setNow(Date.now()), 1000);
        return () => clearInterval(t);
      }, []);
      const isMatchLocked = useCallback((match) => now >= new Date(match.deadline).getTime(), [now]);

      const showToast = useCallback((message, type = 'success') => {
        setNotification({ message, type });
        setTimeout(() => setNotification(null), 3000);
      }, []);

      // ── DATA LOADING + REALTIME ────────────────────────────────────────────────

      useEffect(() => {
        let channel;

        const init = async () => {
          setSyncStatus('connecting');
          const [predsRes, resultsRes, participantsRes] = await Promise.all([
            supabase.from('quiniela_predictions').select('participant_id, data'),
            supabase.from('quiniela_results').select('data').eq('id', 'official').single(),
            supabase.from('quiniela_participants').select('*').order('id'),
          ]);

          if (participantsRes.error) { setSyncStatus('error'); return; }

          const predsMap = {};
          (predsRes.data || []).forEach(r => { predsMap[r.participant_id] = r.data; });

          const loadedParticipants = (participantsRes.data || []).map(p => ({
            ...p,
            predictions: predsMap[p.id] || { mexico: {}, qualifiers: {} }
          }));

          setParticipants(loadedParticipants);
          if (resultsRes.data) setRealResults(resultsRes.data.data || { mexico: {}, qualifiers: {} });

          // Restore saved selection or default to first participant
          const savedId = localStorage.getItem('quiniela_my_participant_id');
          const firstId = loadedParticipants[0]?.id ?? 1;
          setSelectedPlayerId(savedId ? parseInt(savedId) : firstId);

          setSyncStatus('synced');

          // Realtime
          channel = supabase
            .channel('quiniela-live')
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'quiniela_predictions' }, payload => {
              const { participant_id, data } = payload.new;
              setParticipants(prev => prev.map(p => p.id === participant_id ? { ...p, predictions: data } : p));
            })
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'quiniela_results' }, payload => {
              setRealResults(payload.new.data || { mexico: {}, qualifiers: {} });
            })
            .subscribe(status => {
              if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') setSyncStatus('error');
            });
        };

        init().catch(() => setSyncStatus('error'));
        return () => { if (channel) supabase.removeChannel(channel); };
      }, []);

      // ── SAVE HELPERS ──────────────────────────────────────────────────────────

      const savePredictions = async (playerId, data) => {
        setSaving(true);
        const { error } = await supabase
          .from('quiniela_predictions')
          .update({ data })
          .eq('participant_id', playerId);
        setSaving(false);
        if (error) console.error('savePredictions:', error);
      };

      const saveResults = async (data) => {
        const { error } = await supabase
          .from('quiniela_results')
          .update({ data })
          .eq('id', 'official');
        if (error) console.error('saveResults:', error);
      };

      const updatePredictions = async (playerId, updaterFn) => {
        const player = participants.find(p => p.id === playerId);
        if (!player) return;
        const next = updaterFn(player.predictions || { mexico: {}, qualifiers: {} });
        setParticipants(prev => prev.map(p => p.id === playerId ? { ...p, predictions: next } : p));
        await savePredictions(playerId, next);
      };

      // ── TAB NAVIGATION (with PIN guard) ──────────────────────────────────────

      const handleTabClick = (tabId) => {
        const adminTabs = ['admin-results', 'admin-players'];
        if (adminTabs.includes(tabId) && !adminUnlocked) {
          setPendingAdminTab(tabId);
          setShowAdminPin(true);
        } else {
          setActiveTab(tabId);
        }
      };

      const handleAdminUnlock = () => {
        setAdminUnlocked(true);
        setShowAdminPin(false);
        if (pendingAdminTab) { setActiveTab(pendingAdminTab); setPendingAdminTab(null); }
      };

      // ── PLAYER SELECTION ─────────────────────────────────────────────────────

      const selectPlayer = (id) => {
        setSelectedPlayerId(id);
        localStorage.setItem('quiniela_my_participant_id', id);
      };

      // ── SCORE / INTERVAL / QUALIFIER HANDLERS ────────────────────────────────

      const handleScoreChange = async (matchId, side, value, isAdmin = false) => {
        const m = MEXICO_MATCHES.find(x => x.id === matchId);
        if (!isAdmin && m && isMatchLocked(m)) { showToast(`Este partido cerró el ${m.deadlineLabel}. Ya no se aceptan cambios.`, 'info'); return; }
        const clean = value === '' ? '' : Math.max(0, parseInt(value) || 0).toString();
        if (isAdmin) {
          const next = { ...realResults, mexico: { ...realResults.mexico, [matchId]: { ...(realResults.mexico[matchId] || {}), [side]: clean } } };
          setRealResults(next);
          await saveResults(next);
        } else {
          await updatePredictions(selectedPlayerId, cur => ({
            ...cur,
            mexico: { ...cur.mexico, [matchId]: { ...(cur.mexico[matchId] || {}), [side]: clean } }
          }));
        }
      };

      const adjustScore = (matchId, side, delta, isAdmin = false) => {
        const src = isAdmin ? realResults.mexico : (participants.find(p => p.id === selectedPlayerId)?.predictions.mexico || {});
        const cur = src[matchId]?.[side];
        let n = (cur === '' || cur === undefined) ? -1 : parseInt(cur);
        n = n === -1 ? (delta > 0 ? 0 : 0) : Math.max(0, n + delta);
        handleScoreChange(matchId, side, n.toString(), isAdmin);
      };

      const handleIntervalChange = async (matchId, intervalId, isAdmin = false) => {
        const m = MEXICO_MATCHES.find(x => x.id === matchId);
        if (!isAdmin && m && isMatchLocked(m)) { showToast(`Este partido cerró el ${m.deadlineLabel}. Ya no se aceptan cambios.`, 'info'); return; }
        if (isAdmin) {
          const next = { ...realResults, mexico: { ...realResults.mexico, [matchId]: { ...(realResults.mexico[matchId] || {}), interval: intervalId } } };
          setRealResults(next);
          await saveResults(next);
        } else {
          await updatePredictions(selectedPlayerId, cur => ({
            ...cur,
            mexico: { ...cur.mexico, [matchId]: { ...(cur.mexico[matchId] || {}), interval: intervalId } }
          }));
        }
      };

      const toggleQualifier = async (groupLetter, teamCode, isAdmin = false) => {
        if (!isAdmin && selectedPlayer?.predictions?.qualifiersLocked) { showToast('Tus clasificados ya están guardados y bloqueados.', 'info'); return; }
        if (isAdmin) {
          const cur = realResults.qualifiers?.[groupLetter] || [];
          const next = cur.includes(teamCode) ? cur.filter(t => t !== teamCode)
            : cur.length >= 2 ? [cur[1], teamCode] : [...cur, teamCode];
          const nextReal = { ...realResults, qualifiers: { ...realResults.qualifiers, [groupLetter]: next } };
          setRealResults(nextReal);
          await saveResults(nextReal);
        } else {
          await updatePredictions(selectedPlayerId, cur => {
            const g = cur.qualifiers?.[groupLetter] || [];
            const ng = g.includes(teamCode) ? g.filter(t => t !== teamCode)
              : g.length >= 2 ? [g[1], teamCode] : [...g, teamCode];
            return { ...cur, qualifiers: { ...cur.qualifiers, [groupLetter]: ng } };
          });
        }
      };

      const handleLockQualifiers = async () => {
        const totalSelected = Object.keys(GROUPS_CONFIG).reduce((acc, g) => acc + (selectedPlayer?.predictions?.qualifiers?.[g] || []).length, 0);
        const totalNeeded = Object.keys(GROUPS_CONFIG).length * 2;
        const warn = totalSelected < totalNeeded
          ? `Aún te faltan grupos por completar (${totalSelected}/${totalNeeded}). `
          : '';
        if (!window.confirm(`${warn}Al guardar tus clasificados YA NO podrás modificarlos. Esta acción es permanente. ¿Continuar?`)) return;
        await updatePredictions(selectedPlayerId, cur => ({ ...cur, qualifiersLocked: true }));
        showToast('Clasificados guardados y bloqueados. Ya no se pueden editar.', 'success');
      };

      // ── API SYNC ──────────────────────────────────────────────────────────────

      const STATUS_LABELS = {
        NS: 'Partido no ha iniciado', PST: 'Partido pospuesto',
        '1H': 'En juego — 1er tiempo', HT: 'Medio tiempo',
        '2H': 'En juego — 2do tiempo', ET: 'Tiempo extra',
        FT: 'Partido finalizado', PEN: 'Finalizado (penales)',
      };

      const handleSyncMatch = async (match) => {
        setSyncing(s => ({ ...s, [match.id]: true }));
        try {
          const res = await fetch(`/api/sync-results?matchId=${match.id}`);
          const data = await res.json();
          if (!res.ok || data.error) {
            showToast(`Error: ${data.error || 'No se pudo conectar'}`, 'info');
            return;
          }
          if (data.status === 'not_found') {
            showToast('Fixture no encontrado. ¿Ya comenzó el torneo?', 'info');
            return;
          }
          if (data.status === 'NS' || data.status === 'PST') {
            showToast(STATUS_LABELS[data.status] || data.status, 'info');
            return;
          }
          // Aplicar todos los campos disponibles al resultado real
          const cur = realResults.mexico?.[match.id] || {};
          const next = {
            ...cur,
            ...(data.home        !== null && { home:        data.home }),
            ...(data.away        !== null && { away:        data.away }),
            ...(data.corners     !== null && { corners:     data.corners }),
            ...(data.yellowCards !== null && { yellowCards: data.yellowCards }),
            ...(data.redCards    !== null && { redCards:    data.redCards }),
            ...(data.firstGoalMinute !== null && { interval: data.firstGoalMinute }),
          };
          const nextResults = { ...realResults, mexico: { ...realResults.mexico, [match.id]: next } };
          setRealResults(nextResults);
          await saveResults(nextResults);
          showToast(`✅ ${match.title} sincronizado — ${STATUS_LABELS[data.status] || data.status}`);
        } catch {
          showToast('Error de red al sincronizar', 'info');
        } finally {
          setSyncing(s => ({ ...s, [match.id]: false }));
        }
      };

      // ── ADMIN ACTIONS ─────────────────────────────────────────────────────────

      const handleSavePlayerName = async (id) => {
        if (!editingPlayerName.trim()) return;
        await supabase.from('quiniela_participants').update({ name: editingPlayerName.trim() }).eq('id', id);
        setParticipants(prev => prev.map(p => p.id === id ? { ...p, name: editingPlayerName.trim() } : p));
        setEditingPlayerId(null);
        showToast('Nombre actualizado');
      };

      const handleClearParticipant = async (id, name) => {
        if (!window.confirm(`¿Borrar el pronóstico de ${name}? Esta acción no se puede deshacer.`)) return;
        const empty = { mexico: {}, qualifiers: {} };
        setParticipants(prev => prev.map(p => p.id === id ? { ...p, predictions: empty } : p));
        await savePredictions(id, empty);
        showToast(`Pronóstico de ${name} borrado`);
      };

      const handleFillDemo = async () => {
        const rMex = {};
        MEXICO_MATCHES.forEach(m => {
          const h = Math.floor(Math.random() * 3), a = Math.floor(Math.random() * 3);
          const rndMin = () => String(Math.floor(Math.random() * 90) + 1);
          rMex[m.id] = { home: String(h), away: String(a), interval: h === 0 && a === 0 ? 'NONE' : rndMin() };
        });
        const rQuals = {};
        Object.keys(GROUPS_CONFIG).forEach(g => {
          const s = [...GROUPS_CONFIG[g]].sort(() => 0.5 - Math.random());
          rQuals[g] = [s[0], s[1]];
        });
        const nextReal = { mexico: rMex, qualifiers: rQuals };
        setRealResults(nextReal);
        await saveResults(nextReal);
        for (const p of participants) {
          const mex = {}, quals = {};
          MEXICO_MATCHES.forEach(m => { mex[m.id] = { home: String(Math.floor(Math.random() * 3) + 1), away: String(Math.floor(Math.random() * 2)), interval: String(Math.floor(Math.random() * 90) + 1) }; });
          Object.keys(GROUPS_CONFIG).forEach(g => { const s = [...GROUPS_CONFIG[g]].sort(() => 0.5 - Math.random()); quals[g] = [s[0], s[1]]; });
          const pred = { mexico: mex, qualifiers: quals };
          setParticipants(prev => prev.map(q => q.id === p.id ? { ...q, predictions: pred } : q));
          await savePredictions(p.id, pred);
        }
        showToast('Datos demo cargados para todos');
      };

      const handleReset = async () => {
        if (!window.confirm('¿Borrar TODAS las predicciones y resultados? Esta acción no se puede deshacer.')) return;
        const empty = { mexico: {}, qualifiers: {} };
        setRealResults(empty);
        await saveResults(empty);
        setParticipants(prev => prev.map(p => ({ ...p, predictions: { mexico: {}, qualifiers: {} } })));
        for (const p of participants) await savePredictions(p.id, empty);
        showToast('Todos los datos han sido borrados', 'info');
      };

      // ── POINTS ────────────────────────────────────────────────────────────────

      // Puntos base por jugador (sin bonus de minuto)
      const calculatePoints = (player) => {
        let totalPoints = 0, exactScores = 0, correctOutcomes = 0, correctQualifiers = 0, correctCorners = 0, correctYellowCards = 0, correctRedCards = 0;
        MEXICO_MATCHES.forEach(match => {
          const pred = player.predictions?.mexico?.[match.id] || {};
          const real = realResults.mexico?.[match.id] || {};
          const hasPred = pred.home !== undefined && pred.home !== '';
          const hasReal = real.home !== undefined && real.home !== '';
          if (hasPred && hasReal) {
            const pH = parseInt(pred.home), pA = parseInt(pred.away), rH = parseInt(real.home), rA = parseInt(real.away);
            if (pH === rH && pA === rA) { totalPoints += 3; exactScores++; }
            else if ((pH > pA && rH > rA) || (pH < pA && rH < rA) || (pH === pA && rH === rA)) { totalPoints += 1; correctOutcomes++; }
          }
          if (pred.corners !== undefined && pred.corners !== '' && real.corners !== undefined && real.corners !== '') {
            if (parseInt(pred.corners) === parseInt(real.corners)) { totalPoints += 2; correctCorners++; }
          }
          if (pred.yellowCards !== undefined && pred.yellowCards !== '' && real.yellowCards !== undefined && real.yellowCards !== '') {
            if (parseInt(pred.yellowCards) === parseInt(real.yellowCards)) { totalPoints += 2; correctYellowCards++; }
          }
          if (pred.redCards !== undefined && pred.redCards !== '' && real.redCards !== undefined && real.redCards !== '') {
            if (parseInt(pred.redCards) === parseInt(real.redCards)) { totalPoints += 1; correctRedCards++; }
          }
        });
        Object.keys(GROUPS_CONFIG).forEach(g => {
          const pq = player.predictions?.qualifiers?.[g] || [];
          const rq = realResults.qualifiers?.[g] || [];
          pq.forEach(t => { if (rq.includes(t)) { totalPoints += 2; correctQualifiers++; } });
        });
        return { totalPoints, exactScores, correctOutcomes, correctQualifiers, correctCorners, correctYellowCards, correctRedCards };
      };

      // Bonus de minuto: por cada partido, el/los jugadores más cercanos al minuto real del 1er gol reciben +2 pts

        const bonuses = {};
        const wins = {};
        players.forEach(p => { bonuses[p.id] = 0; wins[p.id] = 0; });
        MEXICO_MATCHES.forEach(match => {

            const m = parseInt(v);
            return { id: p.id, dist: (!v || v === '' || isNaN(m)) ? Infinity : Math.abs(m - realMin) };
          });
          const best = Math.min(...entries.map(e => e.dist));
          if (best === Infinity) return;
          entries.filter(e => e.dist === best).forEach(e => { bonuses[e.id] += 2; wins[e.id]++; });
        });
        return { bonuses, wins };

                                className="bg-slate-950 border border-emerald-700 rounded-lg px-2 py-1 text-xs text-white focus:outline-none w-36"
                                autoFocus
                              />
                              <button onClick={() => handleSavePlayerName(p.id)} className="bg-amber-400 text-emerald-950 font-black px-3 py-1 rounded-lg text-xs">✓</button>
                              <button onClick={() => setEditingPlayerId(null)} className="text-slate-500 text-xs px-1">✕</button>
                            </div>
                          ) : (
                            <div>
                              <p className="font-extrabold text-white text-xs">{p.name}</p>
                              <p className="text-[9px] text-emerald-400 font-bold">Participante #{p.id}</p>
                            </div>
                          )}
                        </div>
                        {editingPlayerId !== p.id && (
                          <div className="flex flex-col gap-1.5">
                            <button onClick={() => { setEditingPlayerId(p.id); setEditingPlayerName(p.name); }} className="text-[9px] bg-slate-900 text-amber-400 border border-slate-700 px-2.5 py-1.5 rounded-lg font-bold hover:bg-slate-800 transition-colors">
                              ✏️ Editar
                            </button>
                            <button onClick={() => handleClearParticipant(p.id, p.name)} className="text-[9px] bg-red-950/50 text-red-400 border border-red-800/40 px-2.5 py-1.5 rounded-lg font-bold hover:bg-red-900/50 transition-colors">
                              🗑️ Limpiar
                            </button>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

          </main>

          {/* ── INSPECTOR MODAL ──────────────────────────────────────────────── */}
          {inspectedPlayerId !== null && (() => {
            const player = participants.find(p => p.id === inspectedPlayerId);
            if (!player) return null;
            const stats = calculatePoints(player);
            return (
              <div className="fixed inset-0 z-50 flex items-center justify-center p-3 sm:p-4 bg-black/85 backdrop-blur-sm">
                <div className="bg-slate-950 border-2 border-emerald-500/40 rounded-2xl w-full max-w-4xl max-h-[88vh] overflow-y-auto shadow-2xl fade-in">
                  <div className="p-4 bg-slate-900 border-b border-emerald-900/60 flex items-center justify-between sticky top-0 z-10">
                    <div className="flex items-center gap-3">
                      <span className="text-2xl bg-slate-950 p-2 rounded-xl">{player.avatar}</span>
                      <div>
                        <h3 className="text-sm font-black text-amber-300 uppercase">Quiniela de {player.name}</h3>
                        <p className="text-[9px] text-emerald-300">Pronósticos completos sincronizados</p>
                      </div>
                    </div>
                    <button onClick={() => setInspectedPlayerId(null)} className="bg-slate-800 hover:bg-red-900 text-white font-bold w-8 h-8 rounded-full flex items-center justify-center text-xs transition-colors">✕</button>
                  </div>
                  <div className="p-4 sm:p-6 space-y-6">
                    {(() => {
                      const { bonuses, wins } = computeMinuteBonuses(participants);
                      const fullStats = { ...stats, totalPoints: stats.totalPoints + (bonuses[player.id] || 0), minuteWins: wins[player.id] || 0 };
                      return (
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-2.5">
                      {[
                        { label: 'Puntos Totales', value: `${fullStats.totalPoints} pts`, color: 'text-amber-400' },
                        { label: 'Marcadores Exactos', value: `${fullStats.exactScores} ×`, color: 'text-white' },
                        { label: '⏱️ Minuto más cercano', value: `${fullStats.minuteWins} ×`, color: 'text-white' },
                        { label: 'Clasificados', value: `${fullStats.correctQualifiers} ×`, color: 'text-white' },
                        { label: '🚩 Córners', value: `${fullStats.correctCorners} ×`, color: 'text-white' },
                        { label: '🟨 T. Amarillas', value: `${fullStats.correctYellowCards} ×`, color: 'text-white' },
                        { label: '🟥 T. Rojas', value: `${fullStats.correctRedCards} ×`, color: 'text-white' },
                      ].map(s => (
                        <div key={s.label} className="bg-emerald-900/10 border border-emerald-500/20 p-3 rounded-xl text-center">
                          <span className="block text-[8px] text-emerald-400 uppercase font-black mb-1">{s.label}</span>
                          <span className={`text-xl font-black ${s.color}`}>{s.value}</span>
                        </div>
                      ))}
                    </div>
                      );
                    })()}
                    {/* Mexico matches detail */}
                    <div className="space-y-3">
                      <h4 className="text-xs font-black text-amber-300 uppercase tracking-wider border-b border-emerald-900/60 pb-1.5 flex items-center gap-1.5">🇲🇽 Partidos de México</h4>
                      <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                        {MEXICO_MATCHES.map(match => {
                          const pred = player.predictions?.mexico?.[match.id] || {};
                          const real = realResults.mexico?.[match.id] || {};
                          const hasPred = pred.home !== undefined && pred.home !== '';
                          const isExact = hasPred && real.home !== undefined && parseInt(pred.home) === parseInt(real.home) && parseInt(pred.away) === parseInt(real.away);
                          const isOutcome = hasPred && real.home !== undefined && !isExact && (
                            (parseInt(pred.home) > parseInt(pred.away) && parseInt(real.home) > parseInt(real.away)) ||
                            (parseInt(pred.home) < parseInt(pred.away) && parseInt(real.home) < parseInt(real.away)) ||
                            (parseInt(pred.home) === parseInt(pred.away) && parseInt(real.home) === parseInt(real.away))
                          );
                          return (
                            <div key={match.id} className={`p-3 rounded-xl border space-y-2 ${isExact ? 'border-emerald-500/50 bg-emerald-950/20' : isOutcome ? 'border-blue-500/40 bg-blue-950/10' : 'border-slate-800/60 bg-slate-900/20'}`}>
                              <div className="flex justify-between items-center">
                                <span className="text-[8px] bg-slate-900 px-2 py-0.5 rounded text-slate-400 font-bold">{match.title}</span>
                                {isExact && <span className="text-[8px] bg-emerald-500 text-slate-950 px-1.5 py-0.5 rounded font-black">🎯 +3</span>}
                                {isOutcome && <span className="text-[8px] bg-blue-500 text-white px-1.5 py-0.5 rounded font-black">✓ +1</span>}
                              </div>
                              <div className="flex items-center justify-between text-xs">
                                <div className="flex items-center gap-1.5 w-5/12 overflow-hidden">
                                  <Flag code={match.home} className="w-5 h-3" />
                                  <span className="truncate font-extrabold">{TEAMS_DB[match.home].name}</span>
                                </div>
                                <div className="w-2/12 text-center font-black text-amber-300 bg-slate-900 py-0.5 px-1 rounded text-xs">
                                  {hasPred ? `${pred.home}–${pred.away}` : '-'}
                                </div>
                                <div className="flex items-center gap-1.5 w-5/12 justify-end text-right overflow-hidden">
                                  <span className="truncate font-extrabold">{TEAMS_DB[match.away].name}</span>
                                  <Flag code={match.away} className="w-5 h-3" />
                                </div>
                              </div>
                              {(() => {
                                const realMin = parseInt(real.interval);
                                const predMin = parseInt(pred.interval);
                                const hasRealMin = !isNaN(realMin);
                                const hasPredMin = pred.interval && pred.interval !== '' && !isNaN(predMin);
                                const dist = hasPredMin && hasRealMin ? Math.abs(predMin - realMin) : null;
                                const isWinner = dist !== null && dist === Math.min(...participants.map(p2 => {
                                  const v = parseInt(p2.predictions?.mexico?.[match.id]?.interval);
                                  return (!p2.predictions?.mexico?.[match.id]?.interval || isNaN(v)) ? Infinity : Math.abs(v - realMin);
                                }));
                                return (
                                  <div className={`text-[9px] flex justify-between p-1.5 rounded ${isWinner ? 'bg-amber-400/15 border border-amber-500/30' : 'bg-slate-950/50'}`}>
                                    <span>{isWinner ? '🏆' : '⏱️'}</span>
                                    <span className={`font-bold ${isWinner ? 'text-amber-300' : 'text-slate-300'}`}>
                                      {hasPredMin ? `Min. ${pred.interval}'` : 'Sin elegir'}
                                      {dist !== null && ` (±${dist}')`}
                                      {isWinner && ' +2pts'}
                                    </span>
                                  </div>
                                );
                              })()}
                              <div className="text-[9px] grid grid-cols-3 gap-1">
                                <div className="bg-slate-950/50 p-1 rounded text-center">
                                  <span className="block text-slate-500">🚩</span>
                                  <span className="font-bold text-slate-300">{pred.corners ?? '-'}</span>
                                </div>
                                <div className="bg-slate-950/50 p-1 rounded text-center">
                                  <span className="block text-slate-500">🟨</span>
                                  <span className="font-bold text-slate-300">{pred.yellowCards ?? '-'}</span>
                                </div>
                                <div className="bg-slate-950/50 p-1 rounded text-center">
                                  <span className="block text-slate-500">🟥</span>
                                  <span className="font-bold text-slate-300">{pred.redCards ?? '-'}</span>
                                </div>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                    {/* Qualifiers detail */}
                    <div className="space-y-3">
                      <h4 className="text-xs font-black text-amber-300 uppercase tracking-wider border-b border-emerald-900/60 pb-1.5">👑 Clasificados por Grupo</h4>
                      <div className="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 gap-2">
                        {Object.keys(GROUPS_CONFIG).map(g => {
                          const pq = player.predictions?.qualifiers?.[g] || [];
                          const rq = realResults.qualifiers?.[g] || [];
                          return (
                            <div key={g} className="bg-slate-900/60 border border-emerald-900/20 rounded-xl p-2.5 space-y-1.5">
                              <span className="block text-[8px] font-black text-emerald-400 uppercase">Grupo {g}</span>
                              {pq.length === 0 ? <span className="text-[9px] text-slate-500 italic block">Sin elegir</span> : pq.map(tc => {
                                const isReal = rq.includes(tc);
                                return (
                                  <div key={tc} className={`flex items-center gap-1 p-1 rounded text-[9px] ${isReal ? 'bg-emerald-500/15 border border-emerald-500/30 text-emerald-300 font-black' : 'bg-slate-950 text-slate-300'}`}>
                                    <Flag code={tc} className="w-4 h-2.5" />
                                    <span className="truncate">{TEAMS_DB[tc].name}</span>
                                    {isReal && <span className="ml-auto">✓</span>}
                                  </div>
                                );
                              })}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            );
          })()}

        </div>
      );
    }

    // ── POINTS GUIDE ─────────────────────────────────────────────────────────────

    function PointsGuide() {
      const [open, setOpen] = React.useState(false);
      const rows = [
        { icon: '🎯', label: 'Marcador exacto',             pts: '+3', color: 'text-amber-300' },
        { icon: '✅', label: 'Resultado correcto (G/E/P)',   pts: '+1', color: 'text-emerald-300' },
        { icon: '⏱️', label: 'Más cercano al 1er gol',     pts: '+2', color: 'text-amber-300' },
        { icon: '🚩', label: 'Tiros de esquina (exacto)',    pts: '+2', color: 'text-amber-300' },
        { icon: '🟨', label: 'Tarjetas amarillas (exacto)',  pts: '+2', color: 'text-amber-300' },
        { icon: '🟥', label: 'Tarjetas rojas (exacto)',      pts: '+1', color: 'text-emerald-300' },
        { icon: '👑', label: 'Clasificado por grupo (c/u)',  pts: '+2', color: 'text-amber-300' },
      ];
      return (
        <div className="bg-slate-900/60 border border-emerald-900/40 rounded-2xl overflow-hidden">
          <button
            onClick={() => setOpen(o => !o)}
            className="w-full flex items-center justify-between px-4 py-3 text-left hover:bg-emerald-900/10 transition-colors"
          >
            <div className="flex items-center gap-2">
              <span className="text-base">🏆</span>
              <span className="text-xs font-black uppercase text-amber-300 tracking-wide">Sistema de Puntos</span>
              <span className="text-[9px] bg-emerald-900/50 border border-emerald-700/40 text-emerald-300 px-2 py-0.5 rounded-full font-bold">¿Cómo gano puntos?</span>
            </div>
            <span className="text-emerald-400 text-xs font-black">{open ? '▲' : '▼'}</span>
          </button>
          {open && (
            <div className="px-4 pb-4 grid grid-cols-2 md:grid-cols-4 gap-2">
              {rows.map(r => (
                <div key={r.label} className="bg-slate-950/70 border border-emerald-900/30 rounded-xl p-3 flex items-center gap-2.5">
                  <span className="text-base shrink-0">{r.icon}</span>
                  <div className="flex-1 min-w-0">
                    <span className="block text-[9px] text-slate-300 font-bold leading-tight">{r.label}</span>
                  </div>
                  <span className={`text-sm font-black shrink-0 ${r.color}`}>{r.pts}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ── MATCH CARD ────────────────────────────────────────────────────────────────

    function MatchCard({ match, pred, isAdmin, locked, onScoreChange, onAdjust, onInterval, adminStyle }) {
      const borderClass = locked ? 'border-red-900/40' : adminStyle ? 'border-amber-500/30' : 'border-emerald-800/30';
      return (
        <div className={`bg-slate-900/80 border ${borderClass} rounded-2xl p-4 flex flex-col space-y-4`}>
          <div>
            <div className="flex items-center justify-between gap-2">
              <span className="text-[8px] bg-emerald-950 text-emerald-400 font-extrabold px-2 py-0.5 rounded border border-emerald-900">{match.title}</span>
              {!isAdmin && (locked
                ? <span className="text-[8px] bg-red-500/20 text-red-300 font-black px-2 py-0.5 rounded border border-red-500/40">🔒 Cerrado</span>
                : <span className="text-[8px] bg-amber-400/15 text-amber-300 font-bold px-2 py-0.5 rounded border border-amber-500/30">Cierra {match.deadlineLabel}</span>)}
            </div>
            <p className="text-[10px] text-slate-400 mt-1 font-semibold">📍 {match.stadium}</p>
            <p className="text-[10px] text-amber-400/80 font-bold mt-0.5">🗓 {match.date} · ⏰ {match.time}</p>
          </div>
          {/* Score rows — equipo en fila propia para que el nombre no se corte */}
          <div className="bg-slate-950 rounded-xl border border-emerald-900/40 overflow-hidden">
            <div className="flex items-center gap-3 px-3 py-2.5 border-b border-emerald-900/30">
              <Flag code={match.home} className="w-8 h-5 shrink-0" />
              <span className="text-xs font-black text-slate-100 flex-1">{TEAMS_DB[match.home].name}</span>
              <ScoreInput value={pred.home} onChange={v => onScoreChange('home', v)} onAdjust={d => onAdjust('home', d)} disabled={locked} />
            </div>
            <div className="flex items-center gap-3 px-3 py-2.5">
              <Flag code={match.away} className="w-8 h-5 shrink-0" />
              <span className="text-xs font-black text-slate-100 flex-1">{TEAMS_DB[match.away].name}</span>
              <ScoreInput value={pred.away} onChange={v => onScoreChange('away', v)} onAdjust={d => onAdjust('away', d)} disabled={locked} />
            </div>
          </div>
          {/* Minuto del primer gol — ingreso manual */}
          <div className="bg-slate-950 p-3 rounded-xl space-y-2.5 border border-emerald-900/60">
            <span className="block text-[8px] font-black uppercase text-amber-400">⏱️ Minuto del Primer Gol:</span>
            <p className="text-[8px] text-slate-500">El más cercano gana +2 pts. Si hay empate en distancia, todos lo obtienen.</p>
            <div className="flex items-center gap-1.5 bg-emerald-900/10 border border-emerald-800 rounded-md py-1.5 px-2">
              <button
                onClick={() => { if (!locked) { const v = Math.max(1, (parseInt(pred.interval) || 1) - 1); onInterval(String(v)); } }}
                disabled={locked}
                className={`w-5 h-5 flex items-center justify-center text-xs font-extrabold text-emerald-300 bg-slate-900 rounded shrink-0 ${locked ? 'opacity-40 cursor-not-allowed' : 'hover:text-amber-400'}`}
              >-</button>
              <input
                type="number"
                min="1" max="120"
                value={pred.interval && pred.interval !== '' ? pred.interval : ''}
                onChange={e => { if (!locked) { const v = e.target.value; if (v === '') onInterval(''); else onInterval(String(Math.max(1, Math.min(120, parseInt(v) || 1)))); } }}
                readOnly={locked}
                placeholder="Min."
                className={`flex-1 min-w-0 text-center bg-transparent border-none text-xs font-black text-amber-300 focus:outline-none p-0 ${locked ? 'cursor-not-allowed opacity-50' : ''}`}
              />
              <button
                onClick={() => { if (!locked) { const v = Math.min(120, (parseInt(pred.interval) || 0) + 1); onInterval(String(v)); } }}
                disabled={locked}
                className={`w-5 h-5 flex items-center justify-center text-xs font-extrabold text-emerald-300 bg-slate-900 rounded shrink-0 ${locked ? 'opacity-40 cursor-not-allowed' : 'hover:text-amber-400'}`}
              >+</button>
            </div>
            {pred.interval && pred.interval !== '' && (
              <p className="text-[9px] font-medium">
                {parseInt(pred.interval) <= 45
                  ? <span>⚽ <span className="text-emerald-400 font-bold">Primer tiempo</span> — min. {pred.interval}'</span>
                  : <span>⚽ <span className="text-blue-400 font-bold">Segundo tiempo</span> — min. {pred.interval}'</span>}
              </p>
            )}
          </div>
          {/* Corners & Cards */}
          <div className="bg-slate-950 p-3 rounded-xl space-y-2.5 border border-slate-800/60">
            <span className="block text-[8px] font-black uppercase text-amber-400">🚩 Córners y Tarjetas (total del partido):</span>
            <div className="flex items-center justify-between">
              <div>
                <span className="text-[9px] text-slate-200 font-bold">🚩 Tiros de esquina</span>
                <span className="block text-[8px] text-emerald-500 font-bold">+2 pts si aciertas</span>
              </div>
              <ScoreInput value={pred.corners} onChange={v => onScoreChange('corners', v)} onAdjust={d => onAdjust('corners', d)} disabled={locked} />
            </div>
            <div className="flex items-center justify-between">
              <div>
                <span className="text-[9px] text-yellow-300 font-bold">🟨 Tarjetas amarillas</span>
                <span className="block text-[8px] text-emerald-500 font-bold">+2 pts si aciertas</span>
              </div>
              <ScoreInput value={pred.yellowCards} onChange={v => onScoreChange('yellowCards', v)} onAdjust={d => onAdjust('yellowCards', d)} disabled={locked} />
            </div>
            <div className="flex items-center justify-between">
              <div>
                <span className="text-[9px] text-red-400 font-bold">🟥 Tarjetas rojas</span>
                <span className="block text-[8px] text-emerald-500 font-bold">+1 pt si aciertas</span>
              </div>
              <ScoreInput value={pred.redCards} onChange={v => onScoreChange('redCards', v)} onAdjust={d => onAdjust('redCards', d)} disabled={locked} />
            </div>
          </div>
        </div>
      );
    }

    function ScoreInput({ value, onChange, onAdjust, disabled }) {
      return (
        <div className={`flex items-center bg-emerald-900/10 border border-emerald-800 rounded-md py-0.5 px-1 ${disabled ? 'opacity-50' : ''}`}>
          <button onClick={() => !disabled && onAdjust(-1)} disabled={disabled} className={`w-5 h-5 flex items-center justify-center text-xs font-extrabold text-emerald-300 bg-slate-900 rounded ${disabled ? 'cursor-not-allowed' : 'hover:text-amber-400'}`}>-</button>
          <input
            type="number"
            value={value !== undefined && value !== '' ? value : '0'}
            onChange={e => !disabled && onChange(e.target.value)}
            readOnly={disabled}
            className={`w-8 text-center bg-transparent border-none text-xs font-black text-amber-300 focus:outline-none p-0 mx-1 ${disabled ? 'cursor-not-allowed' : ''}`}
            min="0"
          />
          <button onClick={() => !disabled && onAdjust(1)} disabled={disabled} className={`w-5 h-5 flex items-center justify-center text-xs font-extrabold text-emerald-300 bg-slate-900 rounded ${disabled ? 'cursor-not-allowed' : 'hover:text-amber-400'}`}>+</button>
        </div>
      );
    }

    // ── GROUP COMPONENTS ──────────────────────────────────────────────────────────

    function GroupTabs({ groups, selectedGroup, onSelectGroup, getCount, adminStyle }) {
      return (
        <div className="flex gap-1 bg-slate-950 p-1.5 rounded-xl border border-emerald-900/40 overflow-x-auto scrollbar-thin">
          {Object.keys(groups).map(g => {
            const count = getCount(g);
            return (
              <button key={g} onClick={() => onSelectGroup(g)} className={`flex-shrink-0 w-11 py-2 rounded-lg text-xs font-black relative transition-colors ${selectedGroup === g ? (adminStyle ? 'bg-amber-500 text-slate-950' : 'bg-amber-400 text-emerald-950') : 'text-emerald-300 hover:bg-emerald-900/20'}`}>
                G.{g}
                {count > 0 && <span className={`absolute -top-1 -right-1 text-white text-[8px] font-extrabold w-4 h-4 rounded-full flex items-center justify-center ${adminStyle ? 'bg-amber-500' : 'bg-emerald-500'}`}>{count}</span>}
              </button>
            );
          })}
        </div>
      );
    }

    function GroupGrid({ groupLetter, teams, selected, onToggle, adminStyle, locked }) {
      const borderActive = adminStyle ? 'bg-amber-500/10 border-amber-400' : 'bg-amber-400/10 border-amber-400';
      const tagActive = adminStyle ? 'bg-amber-500 text-slate-950' : 'bg-amber-400 text-emerald-950';
      return (
        <div className={`bg-slate-900/60 border ${adminStyle ? 'border-amber-500/20' : 'border-emerald-800/40'} rounded-2xl p-4 sm:p-6`}>
          <h3 className="text-sm font-black text-emerald-100 mb-4">⚽ Grupo {groupLetter} {locked && <span className="text-[9px] text-red-400 font-bold ml-1">🔒 Cerrado</span>}</h3>
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
            {teams.map(code => {
              const isSelected = selected.includes(code);
              return (
                <button key={code} onClick={() => !locked && onToggle(code)} disabled={locked} className={`p-3.5 rounded-xl border text-center flex flex-col items-center justify-center space-y-2.5 transition-all ${locked ? 'opacity-60 cursor-not-allowed' : ''} ${isSelected ? `${borderActive} shadow-md scale-[1.02]` : 'bg-emerald-950/20 border-emerald-900/40 hover:bg-emerald-900/10'}`}>
                  <Flag code={code} className="w-12 h-8" />
                  <p className="text-xs font-extrabold text-slate-100">{TEAMS_DB[code].name}</p>
                  {isSelected
                    ? <span className={`${tagActive} text-[8px] font-black uppercase px-2 py-0.5 rounded-full`}>🏆 Clasifica</span>
                    : <span className="text-[8px] text-slate-500 font-semibold py-0.5">No elegido</span>}
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    // ── PODIUM ────────────────────────────────────────────────────────────────────

    function Podium({ leaderboard }) {
      const positions = [leaderboard[1], leaderboard[0], leaderboard[2]];
      const styles = [
        { rank: 2, badge: 'bg-slate-400 text-slate-950 w-10 h-10 text-base', card: 'border-slate-500/20', height: 'md:mt-6' },
        { rank: 1, badge: 'bg-amber-400 text-emerald-950 w-12 h-12 text-xl', card: 'border-amber-400/40 bg-amber-950/10', height: '' },
        { rank: 3, badge: 'bg-amber-700 text-white w-10 h-10 text-base', card: 'border-amber-800/20', height: 'md:mt-8' },
      ];
      return (
        <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 items-end pt-4 pb-2">
          {positions.map((p, i) => {
            if (!p) return <div key={i} />;
            const s = styles[i];
            return (
              <div key={p.id} className={`bg-gradient-to-t from-slate-950 to-slate-900 border ${s.card} rounded-2xl p-4 text-center relative ${s.height} max-w-[280px] mx-auto sm:max-w-none w-full`}>
                <div className={`absolute -top-6 left-1/2 -translate-x-1/2 ${s.badge} font-black rounded-full flex items-center justify-center shadow-lg border-2 border-opacity-50`}>
                  {s.rank === 1 ? '👑' : s.rank}
                </div>
                <div className="text-3xl mt-4">{p.avatar}</div>
                <h4 className={`font-black text-xs mt-1 truncate ${s.rank === 1 ? 'text-amber-300' : 'text-slate-200'}`}>{p.name}</h4>
                <div className={`${s.rank === 1 ? 'bg-amber-400 text-emerald-950' : 'bg-emerald-900/30 border border-emerald-800/40 text-white'} rounded-xl py-1.5 px-3 mt-2 inline-block font-black`}>
                  <span className="text-lg">{p.totalPoints}</span> <span className="text-[10px] uppercase font-black">pts</span>
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    // ── MOUNT ─────────────────────────────────────────────────────────────────────

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
